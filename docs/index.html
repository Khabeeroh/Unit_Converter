<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body class="font-serif">
    <div class="text-center my-10 mx-auto border border-gray-300 w-[80%] md:w-[30%] rounded-2xl shadow-gray-300 p-0.5">
        <div class="bg-blue-900 rounded-t-2xl text-amber-50 p-4 pt-6">
            <h1 class="text-center text-xl">Metric/Imperial Unit Conversion</h1>
          <div class="mx-auto my-7">
              <input class="border border-amber-50 text-amber-50 font-bold text-4xl w-24 px-4 p-2 m-auto block text-center rounded-sm" type="text" name="display-input" value="" placeholder="0" id="display-input">
             <button class="bg-amber-50 text-blue-900 font-bold px-5 rounded-sm py-2 mt-5" id="display-btn">Convert</button>
          </div>
        </div>
        <div class=" bg-gray-100  pt-4 pb-4 rounded-b-2xl">
            <div class=" bg-white w-[90%] py-4 mx-auto mb-4">
                <h3 class="text-blue-900 font-bold">Length (Meter/Feet)</h3>
                <p class="text-gray-500 font-bold text-[10px]" id="lengthResult"></p>
            </div>
            <div class=" bg-white w-[90%] py-4 mx-auto my-4">
                <h3 class="text-blue-900 font-bold">Volume (Liters/Gallons)</h3>
                <p class="text-gray-500 font-bold text-[10px]" id="volumeResult"></p>
            </div>
            <div class=" bg-white w-[90%] py-4 mx-auto ">
                <h3 class="text-blue-900 font-bold">Mass (Kilograms/Pounds)</h3>
                <p class="text-gray-500 font-bold text-[10px]" id="massResult"></p>
            </div>
        </div>
    </div>

<script src="index.js"></script>
</body>
</html>
